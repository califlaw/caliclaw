name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
          pip install cython setuptools

      - name: Build engine module
        run: python bin/build_engine.py build_ext --inplace

      - name: Run tests with coverage
        env:
          TELEGRAM_BOT_TOKEN: "123456:ABC-DEF"
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=core --cov=telegram --cov=intelligence --cov=automation \
            --cov=security --cov=safety --cov=monitoring --cov=cli \
            --cov-report=term-missing

      - name: Check no broad exceptions
        run: |
          count=$(grep -r "except Exception" --include="*.py" --exclude-dir=vendor --exclude-dir=tests --exclude-dir=.git -l . 2>/dev/null | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "::error::Found 'except Exception' — use specific types"
            grep -rn "except Exception" --include="*.py" --exclude-dir=vendor --exclude-dir=tests .
            exit 1
          fi
